name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: true
        default: main
      release_tag:
        description: Optional release tag for the images (for example v1.0.0)
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/alexlup06/personal-website
  MIGRATIONS_IMAGE_NAME: ghcr.io/alexlup06/personal-website-migrations

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      deploy_tag: ${{ steps.meta.outputs.deploy_tag }}
      app_tags: ${{ steps.meta.outputs.app_tags }}
      migrations_tags: ${{ steps.meta.outputs.migrations_tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          SHA_TAG="$(git rev-parse HEAD)"
          RELEASE_TAG="${{ inputs.release_tag }}"
          DEPLOY_TAG="$SHA_TAG"

          if [ -n "$RELEASE_TAG" ]; then
            DEPLOY_TAG="$RELEASE_TAG"
          fi

          {
            echo "deploy_tag=$DEPLOY_TAG"

            echo "app_tags<<EOF"
            echo "${IMAGE_NAME}:${SHA_TAG}"
            if [ -n "$RELEASE_TAG" ]; then
              echo "${IMAGE_NAME}:${RELEASE_TAG}"
            fi
            echo "EOF"

            echo "migrations_tags<<EOF"
            echo "${MIGRATIONS_IMAGE_NAME}:${SHA_TAG}"
            if [ -n "$RELEASE_TAG" ]; then
              echo "${MIGRATIONS_IMAGE_NAME}:${RELEASE_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.deploy_tag }}
          tags: ${{ steps.meta.outputs.app_tags }}

      - name: Build and push migrations image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.migrate
          push: true
          tags: ${{ steps.meta.outputs.migrations_tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_SLUG="personal-website"
            DEPLOY_DIR="/opt/${APP_SLUG}"
            DEPLOY_TAG="${{ needs.build-and-push.outputs.deploy_tag }}"

            cd "$DEPLOY_DIR"

            echo "Updating image tags in .env"
            sed -i "s/^APP_IMAGE_TAG=.*/APP_IMAGE_TAG=${DEPLOY_TAG}/" .env || \
              echo "APP_IMAGE_TAG=${DEPLOY_TAG}" >> .env

            sed -i "s/^MIGRATIONS_IMAGE_TAG=.*/MIGRATIONS_IMAGE_TAG=${DEPLOY_TAG}/" .env || \
              echo "MIGRATIONS_IMAGE_TAG=${DEPLOY_TAG}" >> .env

            echo "Pulling images..."
            docker compose -f docker-compose.prod.yaml --env-file .env pull

            echo "Starting postgres..."
            docker compose -f docker-compose.prod.yaml --env-file .env up -d postgres

            echo "Running Authara migrations..."
            docker compose -f docker-compose.prod.yaml --env-file .env run --rm authara-migrations

            echo "Running app migrations..."
            docker compose -f docker-compose.prod.yaml --env-file .env run --rm migrate

            echo "Starting services..."
            docker compose -f docker-compose.prod.yaml --env-file .env up -d authara personal-website gateway caddy

            echo "Deploy complete: ${DEPLOY_TAG}"
