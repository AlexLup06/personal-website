name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  GO_VERSION: "1.25.1"
  NODE_VERSION: "24"

jobs:
  # ------------------------------------------------------------
  # Backend: lint + test
  # ------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@v0.41.0

      - name: Check goimports formatting
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          files=$(git ls-files '*.go' ':!**/*_templ.go')
          test -z "$(goimports -l $files)"

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          templ generate

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./...

  # ------------------------------------------------------------
  # Frontend: format + build
  # ------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: frontend
        run: npm run build:tailwind

      - name: Check formatting
        working-directory: frontend
        run: npm run format:check

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build:webpack

  # ------------------------------------------------------------
  # Docker build (main branch only)
  # ------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: ghcr.io/example/example:ci
