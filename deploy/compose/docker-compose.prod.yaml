services:
  personal-website:
    image: ghcr.io/alexlup06/personal-website:${APP_IMAGE_TAG}
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2.10
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
    restart: unless-stopped
    depends_on:
      - personal-website
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
